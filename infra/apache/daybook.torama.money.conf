# /etc/apache2/sites-available/daybook.conf
# Managed by the deploy pipeline — do not edit by hand on the server.
#
# Required modules: proxy proxy_http headers rewrite ssl
#   sudo a2enmod proxy proxy_http headers rewrite ssl

# ── HTTP → HTTPS ──────────────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName daybook.torama.money
    RewriteEngine On
    # Let certbot answer ACME challenges over HTTP
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName daybook.torama.money

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/daybook.torama.money/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/daybook.torama.money/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # The Node app serves BOTH the PWA frontend and the API on :8090.
    # Reverse-proxy everything to it. Uploads can be large → no buffering limit.
    ProxyPreserveHost On
    ProxyPass        /  http://127.0.0.1:8090/  timeout=120
    ProxyPassReverse /  http://127.0.0.1:8090/
    # Allow large file uploads (documents, receipts, spreadsheets)
    LimitRequestBody 31457280

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    ErrorLog  ${APACHE_LOG_DIR}/daybook-error.log
    CustomLog ${APACHE_LOG_DIR}/daybook-access.log combined
</VirtualHost>
