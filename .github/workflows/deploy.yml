name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/filatei/daybook

jobs:
  # ── 1. Build + push the container image to GHCR ─────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # Multi-arch so the image runs whatever the server is (amd64 or arm64).
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. SSH deploy: ship code + restart (server .env is source of truth) ─────
  # Runs only when you opt in by setting repo variable DEPLOY_ON_PUSH=true AND
  # the LINODE_* secrets. Until then it's skipped (no red failures) — deploy with
  # scripts/bootstrap.sh instead.
  deploy:
    name: Deploy to server
    needs: build
    if: ${{ vars.DEPLOY_ON_PUSH == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No sudo prep needed — bootstrap.sh already created /opt/daybook group-
      # writable for user1, and scp-action creates any missing target subdirs.
      - name: Copy compose, infra & scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_SSH_PORT }}
          source: "docker-compose.yml,infra/apache/daybook.torama.money.conf,infra/systemd/daybook.service,infra/systemd/daybook-mongo-tunnel.service,scripts/deploy.sh,scripts/server-setup.sh,scripts/remote-install.sh,scripts/bootstrap.sh"
          target: "/opt/daybook/backend"

      # The server's /opt/daybook/backend/.env is the single source of truth for
      # app config (managed by bootstrap.sh/remote-install.sh and edited on the
      # box for secrets like JWT/AI/SALES). CI does NOT rewrite it — it only ships
      # new code, pulls the freshly built image, and restarts. This avoids
      # clobbering the auto-picked port, the Mongo tunnel URL, and sync settings.
      - name: Pull image + restart (preserves server .env)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_SSH_PORT }}
          script: |
            set -e
            cd /opt/daybook/backend
            [ -f .env ] || { echo "no .env on server — run scripts/bootstrap.sh once first"; exit 1; }
            chmod +x scripts/deploy.sh scripts/server-setup.sh
            # GHCR login: needs a CLASSIC PAT with read:packages (or a public package).
            # Non-fatal — if it fails, deploy.sh falls back to the server's local image.
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u filatei --password-stdin \
              || echo "WARN: GHCR login failed — GHCR_TOKEN must be a classic PAT with read:packages, or make the package public"
            bash scripts/deploy.sh
