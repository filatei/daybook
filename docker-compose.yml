# Daybook — Node API + Postgres, isolated from otuburu/vote stacks.
# Apache on the host reverse-proxies daybook.torama.money → 127.0.0.1:8090.
#
# Explicit project name — DO NOT remove. Without it Compose derives the project
# from the directory ("backend"), which collides with otuburu's stack and makes
# `--remove-orphans` capable of deleting otuburu's containers.
name: daybook
services:
  postgres:
    image: postgres:16-alpine
    container_name: daybook-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daybook}
      POSTGRES_USER: ${POSTGRES_USER:-daybook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - daybook
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daybook} -d ${POSTGRES_DB:-daybook}"]
      interval: 10s
      timeout: 5s
      retries: 5

  daybook:
    image: ghcr.io/filatei/daybook:latest
    # Local build fallback: `docker compose up -d --build` builds from source on
    # the server (used for the first, no-CI bring-up). Once CI pushes to GHCR,
    # `docker compose pull` uses the published image instead.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daybook
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    # Bind only to loopback — Apache is the public edge (TLS terminator).
    ports:
      - "127.0.0.1:${DAYBOOK_HOST_PORT:-8091}:8090"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-daybook}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-daybook}
    # Lets the app reach host-side services (the fido Mongo SSH tunnel on
    # host port 27018) via host.docker.internal — the container's own 127.0.0.1
    # is NOT the host's. Used by SALES_MONGO_URL.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - daybookdata:/data
    networks:
      - daybook
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8090/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Dedicated ingress — Cloudflare proxies daybook.torama.money here on :2083
  # (Origin Rule sets the port), bypassing the shared Apache. See CLOUDFLARE-INGRESS.md.
  caddy:
    image: caddy:2-alpine
    container_name: daybook-caddy
    restart: always
    depends_on:
      - daybook
    ports:
      - "2083:2083"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/daybook/origin:/etc/caddy/origin:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - daybook

volumes:
  pgdata:
  daybookdata:
  caddy_data:
  caddy_config:

networks:
  daybook:
    name: daybook
