name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/filatei/daybook

jobs:
  # ── 1. Build + push the container image to GHCR ─────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # Multi-arch so the image runs whatever the server is (amd64 or arm64).
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. SSH deploy: copy infra, write .env from Secrets, restart ─────────────
  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_SSH_PORT }}
          script: |
            sudo mkdir -p /opt/daybook/backend/infra/apache /opt/daybook/backend/infra/systemd /opt/daybook/backend/scripts
            sudo chown -R daybookuser:daybookuser /opt/daybook
            sudo chmod -R g+rwX /opt/daybook

      - name: Copy compose, infra & scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_SSH_PORT }}
          source: "docker-compose.yml,infra/apache/daybook.torama.money.conf,infra/systemd/daybook.service,scripts/deploy.sh,scripts/server-setup.sh"
          target: "/opt/daybook/backend"

      - name: Write .env + pull + restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_SSH_PORT }}
          script: |
            set -e
            cd /opt/daybook/backend
            # Preserve the auto-picked host port + the Mongo tunnel port (server-managed,
            # not secrets) across CI deploys, then rewrite .env from GitHub Secrets.
            PORT_PIN="$(grep -E '^DAYBOOK_HOST_PORT=' .env 2>/dev/null || echo 'DAYBOOK_HOST_PORT=8092')"
            SALES_PIN="$(grep -E '^SALES_MONGO_URL=' .env 2>/dev/null || true)"
            cat > .env <<ENVEOF
            PORT=8090
            NODE_ENV=production
            PUBLIC_URL=https://daybook.torama.money
            ${PORT_PIN}
            JWT_SECRET=${{ secrets.DAYBOOK_JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.DAYBOOK_GOOGLE_CLIENT_ID || '763064592541-afo8b3po66bmo04q9ecselk9prske4l0.apps.googleusercontent.com' }}
            SUPERADMIN_EMAILS=${{ secrets.DAYBOOK_SUPERADMIN_EMAILS || 'filatei@gmail.com,filatei@torama.money' }}
            DAYBOOK_DB_PATH=/data/daybook.db
            UPLOAD_DIR=/data/uploads
            MAX_UPLOAD_MB=${{ secrets.DAYBOOK_MAX_UPLOAD_MB || '25' }}
            DAYBOOK_ALLOW_DEV_LOGIN=0
            AI_API_KEY=${{ secrets.DAYBOOK_AI_API_KEY }}
            AI_API_URL=${{ secrets.DAYBOOK_AI_API_URL || 'https://api.anthropic.com/v1/messages' }}
            AI_MODEL=${{ secrets.DAYBOOK_AI_MODEL || 'claude-haiku-4-5-20251001' }}
            SMTP_HOST=${{ secrets.SMTP_HOST || 'smtp-relay.gmail.com' }}
            SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE || 'false' }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=${{ secrets.DAYBOOK_SMTP_FROM || 'Daybook <noreply@torama.money>' }}
            DEFAULT_REPORT_RECIPIENTS=${{ secrets.DAYBOOK_DEFAULT_RECIPIENTS || 'dailyreports@gtsng.com' }}
            ${SALES_PIN}
            ENVEOF
            chmod 600 .env
            chmod +x scripts/deploy.sh scripts/server-setup.sh
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u filatei --password-stdin
            bash scripts/deploy.sh
